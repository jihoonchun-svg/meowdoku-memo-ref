<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modoku 튜토리얼 플로우</title>
<style>
  :root{
    --bg:#f6f1e7; --ink:#4a3f35; --sub:#8c7d6b;
    --c1:#cdeccf; --c2:#fbe0c4; --c3:#cfe0f6; --c4:#f7d3e3;
    --x:#9a8d7d; --mole:#7a5230; --glow:#ffd54a;
    --edge:#3a322a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:22px 14px 40px}
  h1{font-size:17px;margin:0 0 2px}
  .meta{font-size:12px;color:var(--sub);margin-bottom:14px}
  .stage{width:330px;max-width:96vw}
  .coach{background:#fff;border:2px solid #efe6d6;border-radius:16px;padding:13px 15px;box-shadow:0 4px 0 #e9dfcb;min-height:78px;margin-bottom:14px}
  .coach .beat{display:inline-block;background:var(--ink);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;margin-bottom:7px}
  .coach .ko{font-size:15px;font-weight:700;line-height:1.45;white-space:pre-line}
  .coach .en{font-size:11px;color:var(--sub);margin-top:5px;white-space:pre-line}
  /* board */
  .board{position:relative;width:296px;height:296px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);background:var(--edge);border-radius:14px;overflow:hidden;border:5px solid var(--edge)}
  .cell{position:relative;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.5);transition:box-shadow .2s}
  .c1{background:var(--c1)} .c2{background:var(--c2)} .c3{background:var(--c3)} .c4{background:var(--c4)}
  .bt{border-top:3px solid var(--edge)}.bb{border-bottom:3px solid var(--edge)}
  .bl{border-left:3px solid var(--edge)}.br{border-right:3px solid var(--edge)}
  .regionHi{animation:regpulse 1s infinite}
  @keyframes regpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(58,50,42,.0)}50%{box-shadow:inset 0 0 0 3px rgba(58,50,42,.55)}}
  /* mole */
  .mole .tok{position:absolute;width:60%;height:60%;border-radius:50% 50% 48% 48%;background:radial-gradient(circle at 50% 35%,#95683f,var(--mole));box-shadow:inset 0 -3px 4px rgba(0,0,0,.25);z-index:2}
  .mole .nose{position:absolute;width:9px;height:5px;border-radius:50%;background:#f5b7c4;transform:translateY(7px);z-index:3}
  .eyes{position:absolute;z-index:3;transform:translateY(-3px);display:flex;gap:7px}
  .eyes i{width:4px;height:4px;border-radius:50%;background:#2c211a;display:block}
  /* X */
  .x::after{content:"✕";color:var(--x);font-weight:800;font-size:23px;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  /* gestures: 초록=놓기 빨강=X 노랑=힌트 */
  .g-place::before{content:"";position:absolute;inset:5px;border:3px solid #2fb463;border-radius:8px;animation:ring 1s infinite;z-index:4}
  .g-x::before{content:"";position:absolute;inset:5px;border:3px solid #e2574c;border-radius:8px;animation:ring 1s infinite;z-index:4}
  @keyframes ring{0%{transform:scale(.82);opacity:.95}70%{transform:scale(1.05);opacity:.2}100%{opacity:0}}
  .g-drag{outline:3px dashed #e2574c;outline-offset:-3px;animation:dragpulse .9s infinite;z-index:4}
  @keyframes dragpulse{0%,100%{background-color:rgba(226,87,76,.12)}50%{background-color:rgba(226,87,76,.32)}}
  .g-hint{box-shadow:inset 0 0 0 3px var(--glow),0 0 14px var(--glow);animation:hintpulse .8s infinite}
  @keyframes hintpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .ges-label{position:absolute;top:-12px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;font-weight:700;padding:3px 11px;border-radius:999px;white-space:nowrap;z-index:6}
  .lab-place{background:#2fb463;box-shadow:0 2px 0 #1f8f4c}
  .lab-x{background:#e2574c;box-shadow:0 2px 0 #be3b32}
  .lab-hint{background:#e0a800;box-shadow:0 2px 0 #b98700}
  .ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  button{font:inherit;font-weight:700;border:none;border-radius:12px;padding:10px 18px;background:var(--ink);color:#fff;cursor:pointer;box-shadow:0 3px 0 #2f271f}
  button:disabled{opacity:.3;cursor:default;box-shadow:none}
  .dots{display:flex;gap:6px}
  .dots i{width:8px;height:8px;border-radius:50%;background:#d8ccb5;display:block}
  .dots i.on{background:var(--ink);transform:scale(1.25)}
  .done .cell.mole .tok{animation:cheer .5s ease}
  @keyframes cheer{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-5deg)}100%{transform:scale(1)}}
  .tag{font-size:11px;color:var(--sub);margin-top:10px;text-align:center;min-height:16px}
</style>
</head>
<body>
  <h1>🐭 Modoku 튜토리얼 플로우</h1>
  <div class="meta">색1·2·3·4 / Next(또는 →키)로 진행 · 초록=놓기 빨강=X 노랑=힌트</div>
  <div class="stage">
    <div class="coach">
      <span class="beat" id="beat"></span>
      <div class="ko" id="ko"></div>
      <div class="en" id="en"></div>
    </div>
    <div class="board" id="board"></div>
    <div class="ctrl">
      <button id="prev">‹ 이전</button>
      <div class="dots" id="dots"></div>
      <button id="next">다음 ›</button>
    </div>
    <div class="tag" id="tag"></div>
  </div>
<script>
const RMAP=[[1,2,1,1],[1,1,1,3],[1,3,3,3],[1,4,4,3]];
const region=(r,c)=>RMAP[r][c];
const has=(a,r,c)=>a&&a.some(p=>p[0]===r&&p[1]===c);
const RC=[[0,0],[0,2],[0,3],[1,1],[2,1],[3,1]];            // 색2(0,1)의 행·열
const GAA=[[2,2],[2,3],[3,3]];                              // 색4 둘러싼 색3 ㄱ자
const X4=[...RC,...GAA];
const XALL=[[0,0],[0,2],[0,3],[1,0],[1,1],[1,2],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3]];
const STEPS=[
 {beat:"① 색 규칙(R1)", ko:"색마다 두더지 한 마리!\n색2는 칸이 하나뿐 → 여기예요.",
  en:"One mole per color! Color 2 has only one cell.",
  moles:[[0,1]], xs:[], region:[[0,1]], ges:{type:"place",cells:[[0,1]],label:"더블 탭으로 놓기"},
  tag:"1칸짜리 색 = 가장 쉬운 첫 배치"},
 {beat:"② 행·열 금지(R2) · 탭 X", ko:"두더지의 같은 행·열엔 못 와요.\n그 칸들을 각각 탭해서 X!",
  en:"No mole shares its row/column. Tap each cell to cross out!",
  moles:[[0,1]], xs:RC, ges:{type:"tapx",cells:RC,label:"각각 탭해서 X"},
  tag:"행·열 칸을 하나씩 탭해 제외"},
 {beat:"③ 추론 배치 — 색4 혼자 남음", ko:"색4는 이제 (3,2) 한 칸만 남았죠?\n그러니 여기 두더지!",
  en:"Color 4 has only (3,2) left → place here.",
  moles:[[0,1],[3,2]], xs:RC, region:[[3,1],[3,2]], ges:{type:"place",cells:[[3,2]],label:"더블 탭으로 놓기"},
  tag:"(3,1)이 열 크로스로 막혀 색4는 한 칸뿐 → 도출"},
 {beat:"④ 인접 금지(R3) · ㄱ자 드래그 X", ko:"두더지 바로 옆(인접)도 금지!\n색4를 둘러싼 색3 세 칸을 ㄱ자로 쓸어 X.",
  en:"No adjacency. Swipe the 3 color-3 cells around it (L-shape).",
  moles:[[0,1],[3,2]], xs:X4, ges:{type:"dragx",cells:GAA,label:"ㄱ자로 쓸어 X"},
  tag:"(3,2)에 인접한 색3 (2,2)(2,3)(3,3) 제외"},
 {beat:"⑤ 추론 배치 — 색3 마지막 칸", ko:"색3도 (1,3) 한 칸만 남았어요 → 두더지!\n이게 바로 '추론'.",
  en:"Color 3 has only (1,3) left → deduction!",
  moles:[[0,1],[3,2],[1,3]], xs:X4, region:[[1,3],[2,1],[2,2],[2,3],[3,3]], ges:{type:"place",cells:[[1,3]],label:"더블 탭으로 놓기"},
  tag:"좁히면 답이 도출된다"},
 {beat:"⑥ 이제 직접!", ko:"마지막 한 마리는 직접 찾아보세요!\n막히면 💡힌트가 도와줘요.",
  en:"Find the last one yourself! A hint can help.",
  moles:[[0,1],[3,2],[1,3]], xs:X4, region:[], ges:null,
  tag:"핸즈오프 — 남은 칸에서 스스로 추론 (정답 (2,0) 색1)"},
 {beat:"⑦ 완성!", ko:"완성! 규칙을 모두 익혔어요 🎉",
  en:"Done! You've mastered all the rules!",
  moles:[[0,1],[1,3],[2,0],[3,2]], xs:XALL, region:[], ges:null,
  tag:"R1·R2·R3 충족 → 리빌 연출", done:true},
];
let idx=0;
const board=document.getElementById('board');
function render(){
 const s=STEPS[idx];
 document.getElementById('beat').textContent=s.beat;
 document.getElementById('ko').textContent=s.ko;
 document.getElementById('en').textContent=s.en;
 document.getElementById('tag').textContent=s.tag||"";
 board.className="board"+(s.done?" done":"");
 board.innerHTML="";
 for(let r=0;r<4;r++)for(let c=0;c<4;c++){
   const d=document.createElement('div');
   d.className="cell c"+region(r,c);
   if(r===0||region(r-1,c)!==region(r,c))d.classList.add('bt');
   if(r===3||region(r+1,c)!==region(r,c))d.classList.add('bb');
   if(c===0||region(r,c-1)!==region(r,c))d.classList.add('bl');
   if(c===3||region(r,c+1)!==region(r,c))d.classList.add('br');
   const isMole=has(s.moles,r,c), isX=has(s.xs,r,c);
   if(isMole){d.classList.add('mole');d.innerHTML='<span class="tok"></span><span class="eyes"><i></i><i></i></span><span class="nose"></span>';}
   else if(isX){d.classList.add('x');}
   if(has(s.region,r,c)&&!isMole)d.classList.add('regionHi');
   if(s.ges&&has(s.ges.cells,r,c)){
     const gc={place:'g-place',dragx:'g-drag',tapx:'g-x',hint:'g-hint'}[s.ges.type];
     if(gc)d.classList.add(gc);
   }
   board.appendChild(d);
 }
 if(s.ges&&s.ges.label){
   const lc={place:'lab-place',dragx:'lab-x',tapx:'lab-x',hint:'lab-hint'}[s.ges.type]||'lab-x';
   const lab=document.createElement('div');lab.className="ges-label "+lc;lab.textContent=s.ges.label;board.appendChild(lab);
 }
 const dots=document.getElementById('dots');dots.innerHTML="";
 STEPS.forEach((_,i)=>{const x=document.createElement('i');if(i===idx)x.className="on";dots.appendChild(x)});
 document.getElementById('prev').disabled=idx===0;
 document.getElementById('next').disabled=idx===STEPS.length-1;
}
document.getElementById('next').onclick=()=>{if(idx<STEPS.length-1){idx++;render()}};
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;render()}};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next.click();if(e.key==='ArrowLeft')prev.click()});
render();
</script>
</body>
</html>
